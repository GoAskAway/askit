name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout rill
        uses: actions/checkout@v4
        with:
          repository: Actrium/rill
          path: rill

      - name: Link rill to ../rill
        run: ln -s "$GITHUB_WORKSPACE/rill" "$GITHUB_WORKSPACE/../rill"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          # askit 无 workspaces 配置，peerDep 的 rill: workspace:* 在 CI 解析失败，临时改为 *
          sed -i 's/"rill": "workspace:\*"/"rill": "*"/' package.json
          bun install

      - name: Run type check
        run: bun run typecheck

      - name: Run linter
        run: bun run lint

      - name: Run formatter check
        run: bun run format:check

      - name: Run tests
        run: bun test

      - name: Check source files
        run: |
          echo "Source files summary:"
          find src -type f \( -name "*.ts" -o -name "*.tsx" \) | wc -l
          echo "Test files:"
          find src -type f -name "*.test.ts" | wc -l
